name: ci-cd-sobooster-landing

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sobooster-landing-production
  cancel-in-progress: true

env:
  CI: true
  NEXT_TELEMETRY_DISABLED: 1
  NODE_VERSION: "20"
  IMAGE_NAME_PREFIX: sobooster
  DOCKER_PLATFORM: ${{ vars.DOCKER_PLATFORM || 'linux/amd64' }}

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  docker-landing:
    if: github.event_name != 'pull_request'
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image metadata
        id: meta
        env:
          DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          namespace="${DOCKERHUB_NAMESPACE:-$DOCKERHUB_USERNAME}"
          if [ -z "$namespace" ]; then
            echo "Missing DOCKERHUB namespace."
            exit 1
          fi
          echo "dockerhub_namespace=$namespace" >> "$GITHUB_OUTPUT"
          echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push landing image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: ${{ env.DOCKER_PLATFORM }}
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_FIREBASE_API_KEY=${{ vars.NEXT_PUBLIC_FIREBASE_API_KEY }}
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ vars.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ vars.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
            NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ vars.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ vars.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
            NEXT_PUBLIC_FIREBASE_APP_ID=${{ vars.NEXT_PUBLIC_FIREBASE_APP_ID }}
            NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=${{ vars.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
          tags: |
            ${{ steps.meta.outputs.dockerhub_namespace }}/${{ env.IMAGE_NAME_PREFIX }}-landing:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.dockerhub_namespace }}/${{ env.IMAGE_NAME_PREFIX }}-landing:latest
          cache-from: type=gha,scope=landing
          cache-to: type=gha,mode=max,scope=landing

  deploy:
    needs: [ci, docker-landing]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/opt/sobooster' }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE || secrets.DOCKERHUB_USERNAME }}
          IMAGE_NAME_PREFIX: sobooster
          IMAGE_TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          envs: DEPLOY_PATH,DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,DOCKERHUB_NAMESPACE,IMAGE_NAME_PREFIX,IMAGE_TAG
          script: |
            set -euo pipefail

            mkdir -p "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"

            # Docker login
            if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
              printf '%s' "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            fi

            # Create shared network
            docker network create sobooster 2>/dev/null || true

            # Deploy Landing
            LANDING_IMAGE="$DOCKERHUB_NAMESPACE/$IMAGE_NAME_PREFIX-landing:$IMAGE_TAG"
            echo "Pulling: $LANDING_IMAGE"
            docker pull "$LANDING_IMAGE"

            docker rm -f sobooster-landing >/dev/null 2>&1 || true
            docker run -d \
              --restart unless-stopped \
              --name sobooster-landing \
              --network sobooster \
              -e NODE_ENV=production \
              -e HOSTNAME=0.0.0.0 \
              -e PORT=3000 \
              -p 5003:3000 \
              "$LANDING_IMAGE"
            echo "✓ Landing deployed"

            sleep 5
            docker ps --filter name=sobooster- --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'
            docker image prune -f >/dev/null 2>&1 || true
